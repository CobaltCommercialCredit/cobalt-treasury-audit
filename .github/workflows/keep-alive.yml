name: Supabase Keep-Alive
on:
  schedule:
    - cron: '0 12 * * 1,4'  # Mondays and Thursdays at noon UTC
  workflow_dispatch:  # lets you trigger manually to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/settings?select=*&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
